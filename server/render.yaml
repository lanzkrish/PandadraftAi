services:
  - type: web
    name: autodraft-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false # Set this after first deploy to your Render URL
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: LINKEDIN_TOKENS
        sync: false # Paste token JSON here after first OAuth
      - key: CRON_SCHEDULE
        value: "0 9 * * *"
      - key: CRON_TIMEZONE
        value: Asia/Kolkata
      - key: CONTENT_TONE
        value: professional
